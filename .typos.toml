# gix uses `rela_path` (relative path) as an identifier on `Entry` / `Modification`.
# Without this exception the typos hook rewrites it to `real_path` and we no longer compile.
[default.extend-identifiers]
rela_path = "rela_path"

# `patern` / `pattrn` are intentional single-edit misspellings of `pattern`, used as
# fixtures in the `lenient` did-you-mean / levenshtein tests (src/mcp/lenient.rs).
# Without these exceptions the typos hook rewrites them to `pattern` and breaks the tests.
[default.extend-words]
patern = "patern"
pattrn = "pattrn"

[files]
extend-exclude = ["tests/fixtures/**"]
