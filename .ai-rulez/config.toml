version = "4.0"
name = "hacienda-mcp"
description = "Code-map MCP server + scanner — pure-Rust, content-addressed, Fjall-backed inverted index."
gitignore = true

presets = ["claude", "codex"]

builtins = ["rust", "cicd", "documentation", "observability", "default-commands"]

[plugin]
name = "hacienda-mcp"
version = "0.22.0"
display_name = "hacienda-mcp"
description = "Full AI context layer over MCP — tree-sitter code-map, document RAG (PDF/Office/HTML/email + OCR + reranker), shared agent memory, on-demand web crawl, git history + blame + per-symbol diff. 300+ languages, 10+ coding-agent harnesses, content-addressed Fjall + LanceDB."
homepage = "https://github.com/jamon8888/Hacienda-mind"
repository = "https://github.com/jamon8888/Hacienda-mind"
license = "MIT"
category = "developer-tools"
keywords = ["mcp", "agent-context", "rag", "code-map", "tree-sitter"]
tags = ["mcp", "code-intelligence", "rag", "tree-sitter", "git", "embeddings"]
runtimes = ["hermes"]
content_root = "."

[plugin.author]
name = "Na'aman Hirschfeld"
email = "nhirschfeld@gmail.com"
url = "https://github.com/Goldziher"

[plugin.hermes]
source = "pip-package-hermes/hacienda_mcp_hermes_plugin/hermes.py"
requires_python = ">=3.9"


[[mcp_servers]]
name = "ai-rulez"
description = "Manage AI governance config via MCP."
command = "npx"
args = ["-y", "ai-rulez@latest", "mcp"]

[[marketplaces]]
name = "hacienda-mcp"
source = "jamon8888/Hacienda-mind"
type = "github"

[[plugins]]
marketplace = "hacienda-mcp"
name = "hacienda-mcp"
scope = "project"
enabled = true
