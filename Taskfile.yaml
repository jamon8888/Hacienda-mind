version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: "Install all dependencies and initialize project. Idempotent."
    cmds:
      - cargo fetch
      - poly hooks install
      - echo "Setup complete"

  build:
    desc: Build the hacienda-mcp binary (optimized)
    cmds:
      - ./scripts/fast-build.sh

  test:
    desc: Run all tests (optimized)
    cmds:
      - FEATURES=full ./scripts/fast-build.sh
      - cargo test --workspace --features full
      - task: hermes:test

  hermes:test:
    desc: Validate and build the generated Hermes plugin package
    env:
      PYTHONPATH: .hermes/package/src
    cmds:
      - uv run --with pytest python -m pytest pip-package-hermes/tests/test_hermes_register.py
      - rm -rf /tmp/hacienda-mcp-hermes-wheel
      - uv build --wheel --out-dir /tmp/hacienda-mcp-hermes-wheel .hermes/package

  test:verbose:
    desc: Run tests with verbose output
    cmds:
      - cargo test --workspace -- --nocapture

  lint:
    desc: Run all linters and formatters via prek (optimized)
    cmds:
      - ./scripts/fast-build.sh
      - prek run --all-files

  format:
    desc: Format code
    cmds:
      - cargo fmt --all

  check:
    desc: Run all checks (lint + test) - optimized
    cmds:
      - task: lint
      - task: test

  clean:
    desc: Clean build artifacts (optimized)
    cmds:
      - cargo clean
      - rm -rf target-fast

  update:
    desc: Update dependencies (compatible versions only — no Cargo.toml edits)
    cmds:
      - cargo update
      - prek autoupdate

  upgrade:
    desc: Upgrade dependencies to latest, including incompatible bumps (rewrites Cargo.toml)
    cmds:
      - cargo upgrade --incompatible
      - cargo update
      - prek autoupdate

  harden:
    desc: Run the real-OSS hardening harness against all canary repos (optimized)
    cmds:
      - HACIENDA_MCP_HARDEN_NO_BUILD=1 ./scripts/fast-build.sh
      - ./scripts/harden.sh

  demo:record:
    desc: "Record the CLI demo to an asciinema cast and render docs/media/demo.gif (needs asciinema + agg)"
    cmds:
      - ./scripts/demo-record.sh

  release:sync-version:
    desc: "Sync version across every shipped surface (Cargo, npm wrappers, PyPI, plugin manifests). Usage: task release:sync-version VERSION=0.1.0"
    cmds:
      - ./scripts/release-bump.sh "{{.VERSION}}"
      - cargo test --test config_schema --features full -- --ignored regenerate_schema
    requires:
      vars: [VERSION]

  release:dry-run:
    desc: GoReleaser snapshot build — produces dist/ archives without uploading
    cmds:
      - goreleaser release --snapshot --clean --skip=publish

  # Fast development workflow tasks
  dev:
    desc: Fast development build with minimal features
    cmds:
      - FEATURES=documents ./scripts/fast-build.sh

  dev:code:
    desc: Fast development build with code intelligence features
    cmds:
      - FEATURES=code-intel ./scripts/fast-build.sh

  dev:full:
    desc: Full development build with all features
    cmds:
      - FEATURES=full ./scripts/fast-build.sh

  dev:test:
    desc: Quick test run with fast build
    cmds:
      - FEATURES=documents ./scripts/fast-build.sh
      - cargo test --workspace --features documents

  perf:
    desc: Run performance check
    cmds:
      - ./scripts/performance-check.sh

  build:clean:
    desc: Clean build and rebuild fresh
    cmds:
      - task: clean
      - task: build
