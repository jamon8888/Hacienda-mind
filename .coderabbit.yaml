# CodeRabbit configuration to limit PR review scope
# Only review core PII redaction functionality, exclude renames/plugins/docs

reviews:
  max_files: 100

  paths:
    - "src/config/pii.rs"
    - "src/extract/pii.rs"
    - "src/extract/pii_regex.rs"
    - "src/mcp/helpers_pii.rs"
    - "src/mcp/tools_pii.rs"
    - "src/mcp/types_pii.rs"
    - "src/config/validate.rs"
    - "src/scanner.rs"
    - "src/scanner_docs.rs"
    - "src/index/mod.rs"
    - "src/index/writer.rs"
    - "src/store.rs"
    - "crates/pii-candle/**"
    - "crates/xberg-gliner/**"

  exclude_paths:
    - "**/*.md"
    - "**/*.mdx"
    - "**/*.svg"
    - "**/*.png"
    - "**/*.gif"
    - "**/*.json"
    - "**/*.toml"
    - "**/*.yaml"
    - "**/*.yml"
    - "**/*.lock"
    - "**/*.js"
    - "**/*.py"
    - "**/*.sh"
    - "**/*.cmd"
    - "Cargo.lock"
    - "Cargo.toml"
    - "hacienda-mcp.toml"
    - "README.md"
    - "CHANGELOG.md"
    - "CONTRIBUTING.md"
    - "ATTRIBUTIONS.md"
    - "BUILD_OPTIMIZATION_QUICK_START.md"
    - "Taskfile.yaml"
    - "poly.toml"
    - "deny.toml"
    - "rustfmt.toml"
    - "settings.json"
    - "package.json"
    - "llms.txt"
    - "kimi.plugin.json"
    - "gemini-extension.json"
    - ".mcp.json"
    - "build.rs"
    - "commands/**"
    - "scripts/**"
    - "benches/**"
    - "tests/**"
    - "docs/**"
    - "website/**"
    - "schema/**"
    - "skills/**"
    - ".ai-rulez/**"
    - ".github/**"
    - ".claude-plugin/**"
    - ".codex-plugin/**"
    - ".cursor-plugin/**"
    - ".hermes/**"
    - "opencode-plugin/**"
    - "npm-package/**"
    - "pip-package/**"
    - "pip-package-hermes/**"
    - "crates/lsp-positions/**"
    - "crates/tree-sitter-graph/**"
    - "crates/tree-sitter-stack-graphs/**"
    - "src/cli/**"
    - "src/comms/**"
    - "src/intel/**"
    - "src/lang.rs"
    - "src/lang_cli.rs"
    - "src/main.rs"
    - "src/mcp/background.rs"
    - "src/mcp/completions.rs"
    - "src/mcp/helpers.rs"
    - "src/mcp/helpers_admin.rs"
    - "src/mcp/helpers_git.rs"
    - "src/mcp/helpers_shells.rs"
    - "src/mcp/helpers_telemetry.rs"
    - "src/mcp/helpers_web.rs"
    - "src/mcp/identity.rs"
    - "src/mcp/lean.rs"
    - "src/mcp/memory.rs"
    - "src/mcp/mod.rs"
    - "src/mcp/prompts.rs"
    - "src/mcp/savings.rs"
    - "src/mcp/telemetry.rs"
    - "src/mcp/tools.rs"
    - "src/mcp/tools_admin.rs"
    - "src/mcp/tools_code.rs"
    - "src/mcp/tools_git.rs"
    - "src/mcp/tools_governance.rs"
    - "src/mcp/tools_memory.rs"
    - "src/mcp/toon.rs"
    - "src/mcp/types.rs"
    - "src/mcp/types_admin.rs"
