# CodeRabbit configuration - limit review scope
# Only review core PII redaction functionality

reviews:
  path_filters:
    # Include only core PII files
    - "src/config/pii.rs"
    - "src/extract/pii.rs"
    - "src/extract/pii_regex.rs"
    - "src/mcp/helpers_pii.rs"
    - "src/mcp/tools_pii.rs"
    - "src/mcp/types_pii.rs"
    - "src/config/validate.rs"
    - "src/scanner.rs"
    - "src/scanner_docs.rs"
    - "src/index/mod.rs"
    - "src/index/writer.rs"
    - "src/store.rs"
    - "crates/pii-candle/**"
    - "crates/xberg-gliner/**"
    # Exclude everything else
    - "!**/*.md"
    - "!**/*.mdx"
    - "!**/*.svg"
    - "!**/*.png"
    - "!**/*.gif"
    - "!**/*.json"
    - "!**/*.yaml"
    - "!**/*.yml"
    - "!**/*.toml"
    - "!**/*.lock"
