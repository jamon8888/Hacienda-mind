# CodeRabbit configuration to limit PR review scope
# Only review core PII redaction functionality, exclude renames/plugins/docs

reviews:
  # Limit to 100 files max (CodeRabbit free tier limit)
  max_files: 100

  # Only review these paths - core PII functionality
  paths:
    - "src/config/pii.rs"
    - "src/extract/pii.rs"
    - "src/extract/pii_regex.rs"
    - "src/mcp/helpers_pii.rs"
    - "src/mcp/tools_pii.rs"
    - "src/mcp/types_pii.rs"
    - "src/config/validate.rs"
    - "src/scanner.rs"
    - "src/scanner_docs.rs"
    - "src/index/mod.rs"
    - "src/index/writer.rs"
    - "src/store.rs"
    - "crates/pii-candle/**"
    - "crates/xberg-gliner/**"

  # Exclude all the rename/plugin/doc files that exceed the limit
  exclude_paths:
    - "**/*.md"
    - "**/*.mdx"
    - "**/*.svg"
    - "**/*.png"
    - "**/*.gif"
    - "**/*.json"
    - "**/*.yaml"
    - "**/*.yml"
    - "**/*.toml"
    - "**/*.lock"
    - "**/Cargo.lock"
    - "**/package.json"
    - "**/pyproject.toml"
    - "**/poly.toml"
    - "**/deny.toml"
    - "**/opencode.json"
    - "**/opencode-plugin/**"
    - "**/.cursor-plugin/**"
    - "**/.codex-plugin/**"
    - "**/.hermes/**"
    - "**/pip-package/**"
    - "**/pip-package-hermes/**"
    - "**/npm-package/**"
    - "**/opencode-plugin/**"
    - "**/.ai-rulez/**"
    - "**/.claude-plugin/**"
    - "**/website/**"
    - "**/docs/media/**"
    - "**/docs/superpowers/**"
    - "**/scripts/**"
    - "**/skills/**"
    - "**/commands/**"
    - "**/benches/**"
    - "**/tests/fixtures/**"
    - "**/schema/**"
    - "**/*.js"
    - "**/*.sh"
    - "**/*.cmd"
    - "**/build.rs"
    - "**/.mcp.json"
    - "**/poly-hooks.lock"
    - "**/buf.lock"
    - "**/kimi.plugin.json"
    - "**/gemini-extension.json"
    - "**/llms.txt"
    - "**/monitors/**"
    - "**/.mcp.json"
    - "**/ATTRIBUTIONS.md"
    - "**/CONTRIBUTING.md"
