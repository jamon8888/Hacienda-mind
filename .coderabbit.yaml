    - "**/CHANGELOG.md"
    - "**/README.md"
    - "**/Taskfile.yaml"
    - "**/package.json"
    - "**/poly.toml"
    - "**/hacienda-mcp.toml"
    - "**/cargo-config*.toml"
    - "**/.cargo/**"